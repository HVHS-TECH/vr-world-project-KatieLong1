<!DOCTYPE html>
<html lang=en>
    <head>
        <title>A-Frame scene</title>
        <script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
    </head>
    <body>
        <a-scene>
            <a-sphere position="1 -1 -3" color="green" ></a-sphere>
            <a-sphere position="8 3 0" color="red" ></a-sphere>
            <a-sphere position="-7 2 -1" color="blue" ></a-sphere>
            <a-sphere position="0 6 -3" color="yellow" ></a-sphere>
        </a-scene>
    </body>
</html>
